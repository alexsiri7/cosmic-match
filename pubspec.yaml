name: cosmic_match
description: Space-themed match-3 puzzle game
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.37.0
  flame_riverpod: ^5.5.0  # pinned <6.0.0 due to flutter_riverpod ^3 conflict; revisit on next dep update
  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  logger: ^2.7.0
  archive: ^4.0.9
  connectivity_plus: ^6.1.3
  flutter_secure_storage: ^10.0.0
  http: ^1.2.2
  sentry_flutter: ^8.12.0
  package_info_plus: ^9.0.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flame_test: ^2.2.4
  sentry_dart_plugin: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# sentry_dart_plugin configuration.
# Runs via `flutter pub run sentry_dart_plugin` after release builds in CI
# to upload Dart debug symbols / obfuscation maps to Sentry so stack traces
# can be symbolicated server-side.
#
# auth_token is NOT stored here — it's read from the SENTRY_AUTH_TOKEN env
# var supplied by the CI job. The EU region still uses the sentry.io base
# URL; the plugin auto-routes based on org.
sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
  project: cosmic-match
  org: alex-siri
  url: https://sentry.io/
