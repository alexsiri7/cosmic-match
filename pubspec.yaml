name: cosmic_match
description: Space-themed match-3 puzzle game
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.37.0
  flame_riverpod: ^5.5.0  # pinned <6.0.0 due to flutter_riverpod ^3 conflict; revisit on next dep update
  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  archive: ^3.6.0
  flutter_secure_storage: ^9.0.0
  sentry_flutter: ^8.12.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
