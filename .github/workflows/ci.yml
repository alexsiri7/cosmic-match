name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.41.7'
          cache: true

      - run: flutter analyze

  test:
    name: Test
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.41.7'
          cache: true

      - run: flutter test

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.41.7'
          cache: true

      - uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d7336334ccaf61c96 # v4.4.1

      - run: flutter pub get

      - name: Resolve version
        env:
          GH_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF#refs/tags/v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')"
          fi
          # github.run_number is monotonically increasing per workflow per repo and
          # is unaffected by history rewrites. The +1000 offset vaults past version
          # codes (incl. 1, 64, 66) already consumed in Play Console under the prior
          # `git rev-list --count HEAD` scheme. See issue #134.
          # NOTE: run_number is scoped to this workflow file's path — renaming or
          # moving ci.yml will reset the counter and break Play Store monotonicity.
          BUILD_NUMBER=$((GH_RUN_NUMBER + 1000))
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      # Resolve signing keystore: try the real release keystore from secrets;
      # fall back to a CI-throwaway if the secret is missing or unreadable.
      # This keeps the release build path exercised on every PR even when the
      # real keystore is unavailable — catching regressions before merge to main.
      # Artifact naming reflects which keystore produced the AAB.
      - name: Resolve signing keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          set -u
          KS=android/cosmic-match-release.jks
          USED_REAL=no
          if [ -n "${KEYSTORE_B64:-}" ]; then
            printf '%s' "$KEYSTORE_B64" | base64 --decode --ignore-garbage > "$KS" 2>/dev/null || true
            if keytool -list -storetype PKCS12 -storepass "${STORE_PASSWORD:-}" -keystore "$KS" >/dev/null 2>&1 \
               || keytool -list -storetype JKS    -storepass "${STORE_PASSWORD:-}" -keystore "$KS" >/dev/null 2>&1; then
              echo "::notice ::Using real release keystore from KEYSTORE_BASE64"
              USED_REAL=yes
            else
              echo "::warning ::KEYSTORE_BASE64 is set but the decoded file is not a readable keystore. Falling back to CI throwaway. The produced AAB will NOT be uploadable to Play Store."
              rm -f "$KS"
            fi
          else
            echo "::notice ::KEYSTORE_BASE64 not set (PR run or missing secret) — generating CI throwaway keystore"
          fi

          if [ "$USED_REAL" = "no" ]; then
            keytool -genkey -v \
              -keystore "$KS" \
              -alias cosmic-match \
              -keyalg RSA -keysize 2048 \
              -validity 1 \
              -storepass ci_build -keypass ci_build \
              -dname "CN=CI Build" \
              -storetype PKCS12
            STORE_PASSWORD=ci_build
            KEY_PASSWORD=ci_build
            KEY_ALIAS=cosmic-match
          fi

          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=${{ github.workspace }}/$KS"
          } > android/key.properties
          echo "used_real=$USED_REAL" >> "$GITHUB_OUTPUT"

      - name: Build release AAB
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FEEDBACK_WORKER_URL: ${{ vars.FEEDBACK_WORKER_URL || 'https://feedback.alexsiri7.workers.dev/' }}
          # Read by the Sentry Android Gradle Plugin (android/app/build.gradle.kts)
          # to upload the R8 mapping.txt to Sentry mid-build. Empty values disable
          # the upload but the build still succeeds (PR runs from forks).
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alex-siri
          SENTRY_PROJECT: cosmic-match
        # --split-debug-info + --obfuscate produce the Dart debug symbols that
        # sentry_dart_plugin uploads in the next step, enabling server-side
        # symbolication of release stack traces.
        run: flutter build appbundle --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER --split-debug-info=build/symbols --obfuscate --dart-define=SENTRY_DSN=$SENTRY_DSN --dart-define=FEEDBACK_WORKER_URL=$FEEDBACK_WORKER_URL

      - name: Upload debug symbols to Sentry (AAB)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        # Gate on SENTRY_AUTH_TOKEN so PRs from forks (no secret access)
        # don't fail this step.
        if: env.SENTRY_AUTH_TOKEN != ''
        run: flutter pub run sentry_dart_plugin

      - name: Build release APK
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          FEEDBACK_WORKER_URL: ${{ vars.FEEDBACK_WORKER_URL || 'https://feedback.alexsiri7.workers.dev/' }}
        run: flutter build apk --release --build-name=$BUILD_NAME --build-number=$BUILD_NUMBER --split-debug-info=build/symbols --obfuscate --dart-define=SENTRY_DSN=$SENTRY_DSN --dart-define=FEEDBACK_WORKER_URL=$FEEDBACK_WORKER_URL

      - name: Upload debug symbols to Sentry (APK)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        if: env.SENTRY_AUTH_TOKEN != ''
        run: flutter pub run sentry_dart_plugin

      - name: Upload signed AAB
        if: steps.keystore.outputs.used_real == 'yes'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload signed APK
        if: steps.keystore.outputs.used_real == 'yes'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload CI-signed AAB (not for Play Store)
        if: steps.keystore.outputs.used_real != 'yes'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: release-aab-ci-throwaway
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Upload CI-signed APK (not reinstallable over real builds)
        if: steps.keystore.outputs.used_real != 'yes'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: release-apk-ci-throwaway
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Publish to Play Store internal track (non-tag)
        if: steps.keystore.outputs.used_real == 'yes' && !startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: net.interstellarai.cosmicmatch
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          # Cleared the Play Console "no deobfuscation file" warning — see issue #136.
          # Native debug symbols are embedded in the AAB itself via ndk.debugSymbolLevel,
          # so we don't pass `debugSymbols:` here.
          mappingFile: build/app/outputs/mapping/release/mapping.txt
          track: internal
          status: draft
          releaseName: ${{ env.BUILD_NAME }}

      - name: Publish to Play Store production (tag release)
        if: steps.keystore.outputs.used_real == 'yes' && startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: net.interstellarai.cosmicmatch
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          # Cleared the Play Console "no deobfuscation file" warning — see issue #136.
          # Native debug symbols are embedded in the AAB itself via ndk.debugSymbolLevel,
          # so we don't pass `debugSymbols:` here.
          mappingFile: build/app/outputs/mapping/release/mapping.txt
          track: production
          status: completed
          releaseName: ${{ env.BUILD_NAME }}

      - name: Create GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Notify prod landing
        if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && steps.keystore.outputs.used_real == 'yes'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          curl -s -o /dev/null \
            -H "Title: cosmic-match landed in prod" \
            -H "Tags: tada" \
            -d "Cosmic Match uploaded to Play Store ✓" \
            "ntfy.sh/$NTFY_TOPIC"

      - name: Clean up signing credentials
        if: always()
        run: rm -f android/cosmic-match-release.jks android/key.properties
