name: Generate Store Screenshots

on:
  workflow_dispatch:

jobs:
  record:
    name: Record Flutter goldens & update store-listing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Record screenshot goldens
        run: flutter test --update-goldens test/screenshot/

      - name: List generated goldens
        if: always()
        run: |
          echo "=== test/screenshot/goldens/ ==="
          ls -la test/screenshot/goldens/ 2>/dev/null || echo "(dir missing)"

      - name: Copy goldens to store-listing/screenshots
        run: |
          GOLDEN="test/screenshot/goldens"
          cp "$GOLDEN/phone_1.png"    store-listing/screenshots/phone_1.png
          cp "$GOLDEN/phone_2.png"    store-listing/screenshots/phone_2.png
          cp "$GOLDEN/phone_3.png"    store-listing/screenshots/phone_3.png
          cp "$GOLDEN/tablet7_1.png"  store-listing/screenshots/tablet7_1.png
          cp "$GOLDEN/tablet7_2.png"  store-listing/screenshots/tablet7_2.png
          cp "$GOLDEN/tablet7_3.png"  store-listing/screenshots/tablet7_3.png
          cp "$GOLDEN/tablet10_1.png" store-listing/screenshots/tablet10_1.png
          cp "$GOLDEN/tablet10_2.png" store-listing/screenshots/tablet10_2.png
          cp "$GOLDEN/tablet10_3.png" store-listing/screenshots/tablet10_3.png

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/screenshot/goldens/ store-listing/screenshots/
          git diff --staged --quiet && echo "No screenshot changes" && exit 0
          BRANCH="chore/update-screenshots-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update store screenshots from Flutter goldens"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update store screenshots from Flutter goldens" \
            --body "Auto-generated by the Generate Store Screenshots workflow." \
            --base main \
            --head "$BRANCH"
